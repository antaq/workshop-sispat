<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cadastro de Bens - Visão Geral</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&amp;family=Open+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            overflow: hidden;
            font-family: 'Open Sans', sans-serif;
        }
        .slide-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            overflow: hidden;
        }
        .header-bar {
            background-color: #003366;
            height: 12px;
            width: 100%;
        }
        .secondary-bar {
            background-color: #0066CC;
            height: 6px;
            width: 100%;
        }
        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        .text-brand-primary {
            color: #003366;
        }
        .bg-brand-primary {
            background-color: #003366;
        }
        .text-brand-secondary {
            color: #0066CC;
        }
        .bg-brand-secondary {
            background-color: #0066CC;
        }
        
        /* Main Layout */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 20px 64px 36px 64px;
            gap: 24px;
        }

        /* Área principal: painel de vídeo */
        .split-section {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }

        .media-panel {
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            background-color: #1E293B;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 4px solid #334155;
        }

        .screen-glare {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.05);
            transform: rotate(30deg);
            pointer-events: none;
        }

        .video-frame {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(15,23,42,0.6);
        }

        .video-frame video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Top Accents -->
<div class="header-bar"></div>
<div class="secondary-bar"></div>
<!-- Header -->
<div class="px-12 pt-8 pb-4 relative z-20">
<div class="flex items-center gap-3">
<div class="w-1.5 h-10 bg-brand-primary"></div>
<div>
<h1 class="text-3xl font-montserrat font-bold text-brand-primary uppercase tracking-tight">Bens Cadastrados</h1>
<p class="text-gray-500 font-medium text-lg mt-1">Gestão e visualização do inventário patrimonial</p>
</div>
<div class="ml-auto flex items-center gap-2 opacity-80">
<i class="fas fa-boxes text-brand-secondary text-xl"></i>
<p class="font-montserrat font-bold text-gray-400 text-sm tracking-widest">INVENTÁRIO</p>
</div>
</div>
</div>
<!-- Main Content -->
<div class="content-wrapper">
<div class="split-section">
<div class="media-panel">
<div class="video-frame">
<video id="sispat-video" src="Imagens/SISPAT.mp4" autoplay loop muted playsinline></video>
</div>
<div class="screen-glare"></div>
</div>
</div>
</div>
<!-- Footer -->
<div class="px-12 pb-6 pt-2 flex justify-between items-center z-20">
<p class="text-gray-400 text-xs font-montserrat">SisPAT - Treinamento Simplificado da Funcionalidade de
    Cadastro de Bens e Inventário</p>
<p class="text-gray-300 text-xs font-mono">10 / 16</p>
</div>
</div>
</body>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var video = document.getElementById('sispat-video');
    if (video) {
      video.playbackRate = 2.0;
    }
  });
</script>
</html>
