<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exportar PDF - Manual de Procedimentos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1f2937;
      color: #e5e7eb;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    /* ---- Barra superior ---- */
    .toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(17, 24, 39, 0.95);
      border-bottom: 1px solid #334155;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(8px);
    }
    .toolbar-title { font-size: 16px; color: #9ca3af; }
    .toolbar button {
      background: #1E40AF;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .toolbar button:hover { background: #1e3a8a; }
    .toolbar .btn-secondary {
      background: #1f2937;
      border: 1px solid #334155;
      color: #e5e7eb;
      margin-right: 8px;
    }
    .toolbar .btn-secondary:hover { border-color: #1E40AF; }

    /* ---- Loading ---- */
    .loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 999;
      background: rgba(15, 23, 42, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .loading-text { font-size: 18px; color: #e5e7eb; }
    .loading-bar {
      width: 300px; height: 6px;
      background: #334155;
      border-radius: 3px;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%;
      background: #1E40AF;
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    /* ---- Preview na tela ---- */
    .slides-container {
      padding: 70px 20px 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /*
      Wrapper = 960×540 (proporção 16:9)
      Iframe  = 1280×720 escalado para 0.75 (960/1280)
      Resultado: conteúdo cabe perfeitamente sem cortar
    */
    .slide-wrapper {
      width: 960px;
      height: 540px;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .slide-frame {
      position: absolute;
      top: 0; left: 0;
      width: 1280px;
      height: 720px;
      border: 0;
      background: #fff;
      transform: scale(0.75);
      transform-origin: top left;
    }

    /* ---- Impressão ---- */
    @page {
      size: A4 landscape;
      margin: 0;
    }

    @media print {
      body { background: white; }

      .toolbar, .loading { display: none !important; }

      .slides-container {
        padding: 0;
        gap: 0;
        align-items: flex-start;
      }

      /*
        A4 landscape = 297mm × 210mm
        Escala: 297mm em px (96dpi) = 1122.5px → 1122.5/1280 = 0.877
        Altura: 720 × 0.877 = 631px < 210mm (793px) ✓ cabe sem cortar
      */
      .slide-wrapper {
        width: 297mm;
        height: 210mm;
        border-radius: 0;
        box-shadow: none;
        overflow: hidden;
        position: relative;
        page-break-after: always;
        break-after: page;
      }

      .slide-wrapper:last-child {
        page-break-after: avoid;
        break-after: avoid;
      }

      .slide-frame {
        position: absolute;
        top: 0; left: 0;
        width: 1280px;
        height: 720px;
        transform: scale(0.877);
        transform-origin: top left;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">Exportar PDF — Manual de Procedimentos</span>
    <div>
      <button class="btn-secondary" onclick="window.close()">← Voltar</button>
      <button onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-text" id="loadingText">Carregando slides... 0 / 16</div>
    <div class="loading-bar">
      <div class="loading-bar-fill" id="loadingBar"></div>
    </div>
  </div>

  <div class="slides-container" id="container"></div>

  <script>
    const total = 16;
    const container = document.getElementById('container');
    const loadingEl = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const loadingBar = document.getElementById('loadingBar');
    let loaded = 0;

    function onLoad(iframe) {
      // Esconde a barra de navegação dentro do iframe
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const style = doc.createElement('style');
        style.textContent = '.slide-nav { display: none !important; }';
        doc.head.appendChild(style);
      } catch(e) {}

      loaded++;
      loadingText.textContent = `Carregando slides... ${loaded} / ${total}`;
      loadingBar.style.width = `${(loaded / total) * 100}%`;
      if (loaded === total) {
        setTimeout(() => { loadingEl.style.display = 'none'; }, 500);
      }
    }

    for (let i = 1; i <= total; i++) {
      const wrapper = document.createElement('div');
      wrapper.className = 'slide-wrapper';

      const iframe = document.createElement('iframe');
      iframe.src = `slides/slide${i}.html`;
      iframe.className = 'slide-frame';
      iframe.title = `Slide ${i}`;
      iframe.scrolling = 'no';
      iframe.addEventListener('load', () => onLoad(iframe));

      wrapper.appendChild(iframe);
      container.appendChild(wrapper);
    }
  </script>
</body>
</html>
