<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apresentacao SisPAT</title>
  <style>
    :root { --bg:#0f172a; --panel:#111827; --text:#e5e7eb; --muted:#9ca3af; --accent:#0066cc; }
    * { box-sizing:border-box; }
    html,body { margin:0; width:100%; height:100%; background:radial-gradient(circle at top,#1f2937 0%,var(--bg) 55%); color:var(--text); font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif; overflow:hidden; }
    .app { width:100vw; height:100vh; display:grid; grid-template-rows:1fr auto; place-items:center; padding:18px; gap:12px; }
    .stage { width:min(96vw,calc(96vh * 16/9)); aspect-ratio:16/9; background:#000; border-radius:10px; border:1px solid #334155; box-shadow:0 16px 44px rgba(0,0,0,.45); overflow:hidden; position:relative; }
    iframe { width:1920px; height:1080px; border:0; background:#fff; display:block; position:absolute; top:0; left:0; transform-origin:top left; }
    .controls { width:min(96vw,calc(96vh * 16/9)); display:flex; align-items:center; justify-content:space-between; background:rgba(17,24,39,.9); border:1px solid #334155; border-radius:10px; padding:10px 14px; }
    .left,.right { display:flex; align-items:center; gap:8px; }
    button { background:#1f2937; color:var(--text); border:1px solid #334155; border-radius:8px; padding:8px 12px; cursor:pointer; font-size:14px; }
    button:hover { border-color:var(--accent); }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .badge { font-size:14px; color:var(--muted); min-width:102px; text-align:center; display:flex; align-items:center; gap:6px; }
    .slide-select { background:#1f2937; color:var(--text); border:1px solid #334155; border-radius:6px; padding:4px 8px; font-size:14px; cursor:pointer; text-align:center; }
    .slide-select:hover { border-color:var(--accent); }
    .slide-select:focus { outline:none; border-color:var(--accent); }
    .hint { font-size:12px; color:var(--muted); }
  </style>
</head>

    var frame = document.getElementById("slideFrame");
    var slideSelect = document.getElementById("slideSelect");
    var prevBtn = document.getElementById("prevBtn");
    var nextBtn = document.getElementById("nextBtn");
    var fsBtn = document.getElementById("fsBtn");
    for (var i = 1; i <= total; i++) { var o = document.createElement("option"); o.value = i; o.textContent = i; slideSelect.appendChild(o); }
    var current = 1;
    function render() {
      frame.src = "data:text/html;base64," + slidesB64[current - 1];
      slideSelect.value = current;
      prevBtn.disabled = current === 1;
      nextBtn.disabled = current === total;
    }
    slideSelect.addEventListener("change", function() { current = parseInt(slideSelect.value); render(); });
    function next() { if (current < total) { current++; render(); } }
    function prev() { if (current > 1) { current--; render(); } }
    prevBtn.addEventListener("click", prev);
    nextBtn.addEventListener("click", next);
    fsBtn.addEventListener("click", function() {
      if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(function(){}); }
      else { document.exitFullscreen().catch(function(){}); }
    });
    document.addEventListener("keydown", function(ev) {
      if (ev.key === "ArrowRight" || ev.key === " " || ev.key === "PageDown") { ev.preventDefault(); next(); }
      if (ev.key === "ArrowLeft" || ev.key === "PageUp") { ev.preventDefault(); prev(); }
      if (ev.key.toLowerCase() === "f") { fsBtn.click(); }
      if (ev.key === "Home") { current = 1; render(); }
      if (ev.key === "End") { current = total; render(); }
    });
    render();
    var stage = document.querySelector(".stage");
    function scaleFrame() {
      var s = Math.min(stage.clientWidth / 1920, stage.clientHeight / 1080);
      frame.style.transform = "scale(" + s + ")";
    }
    scaleFrame();
    window.addEventListener("resize", scaleFrame);
    new ResizeObserver(scaleFrame).observe(stage);
  </script>
