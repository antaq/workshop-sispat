<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apresentação SisPAT</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #0066cc;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #1f2937 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      place-items: center;
      padding: 18px;
      gap: 12px;
    }

    .stage {
      width: min(96vw, calc(96vh * 16 / 9));
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 10px;
      border: 1px solid #334155;
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      position: relative;
    }

    iframe {
      width: 1920px;
      height: 1080px;
      border: 0;
      background: #fff;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
    }

    .controls {
      width: min(96vw, calc(96vh * 16 / 9));
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 14px;
    }

    .left, .right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button {
      background: #1f2937;
      color: var(--text);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { border-color: var(--accent); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .badge {
      font-size: 14px;
      color: var(--muted);
      min-width: 102px;
      text-align: center;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .slide-select {
      background: #1f2937;
      color: var(--text);
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
    }

    .slide-select:hover { border-color: var(--accent); }
    .slide-select:focus { outline: none; border-color: var(--accent); }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stage">
      <iframe id="slideFrame" title="Slide"></iframe>
    </div>

    <div class="controls">
      <div class="left">
        <button id="prevBtn" type="button">Anterior</button>
        <button id="nextBtn" type="button">Próximo</button>
      </div>

      <div class="badge">
        <select id="slideSelect" class="slide-select"></select>
        <span>/ 16</span>
      </div>

      <div class="right">
        <button id="printBtn" type="button">Exportar PDF</button>
        <button id="fsBtn" type="button">Tela cheia</button>
        <div class="hint">Teclas: ← → Space F</div>
      </div>
    </div>
  </div>

  <script>
    const total = 16;
    const frame = document.getElementById('slideFrame');
    const slideSelect = document.getElementById('slideSelect');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const fsBtn = document.getElementById('fsBtn');

    // Populate select options
    for (let i = 1; i <= total; i++) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = i;
      slideSelect.appendChild(opt);
    }

    let current = 1;

    function fileFor(n) {
      return `slide-${String(n).padStart(2, '0')}.html`;
    }

    function render() {
      frame.src = fileFor(current);
      slideSelect.value = current;
      prevBtn.disabled = current === 1;
      nextBtn.disabled = current === total;
    }

    slideSelect.addEventListener('change', () => {
      current = parseInt(slideSelect.value);
      render();
    });

    function next() {
      if (current < total) {
        current += 1;
        render();
      }
    }

    function prev() {
      if (current > 1) {
        current -= 1;
        render();
      }
    }

    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);

    document.getElementById('printBtn').addEventListener('click', () => {
      window.open('print.html', '_blank');
    });

    fsBtn.addEventListener('click', async () => {
      const root = document.documentElement;
      if (!document.fullscreenElement) {
        try { await root.requestFullscreen(); } catch (_) {}
      } else {
        try { await document.exitFullscreen(); } catch (_) {}
      }
    });

    document.addEventListener('keydown', (ev) => {
      if (ev.key === 'ArrowRight' || ev.key === ' ' || ev.key === 'PageDown') {
        ev.preventDefault();
        next();
      }
      if (ev.key === 'ArrowLeft' || ev.key === 'PageUp') {
        ev.preventDefault();
        prev();
      }
      if (ev.key.toLowerCase() === 'f') {
        fsBtn.click();
      }
      if (ev.key === 'Home') {
        current = 1;
        render();
      }
      if (ev.key === 'End') {
        current = total;
        render();
      }
    });

    render();

    // Scale iframe to fit stage container
    const stage = document.querySelector('.stage');
    function scaleFrame() {
      const stageW = stage.clientWidth;
      const stageH = stage.clientHeight;
      const scale = Math.min(stageW / 1920, stageH / 1080);
      frame.style.transform = `scale(${scale})`;
    }

    scaleFrame();
    window.addEventListener('resize', scaleFrame);
    new ResizeObserver(scaleFrame).observe(stage);
  </script>
</body>
</html>
