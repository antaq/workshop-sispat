<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SisPAT - Capa Institucional</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&amp;family=Open+Sans:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f3f4f6;
        }
        .slide-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            overflow: hidden;
        }
        .bg-brand-primary {
            background-color: #003366; /* Azul Escuro Institucional */
        }
        .bg-brand-secondary {
            background-color: #0066CC; /* Azul Vibrante */
        }
        .text-brand-primary {
            color: #003366;
        }
        .text-brand-secondary {
            color: #0066CC;
        }
        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        .font-opensans {
            font-family: 'Open Sans', sans-serif;
        }
        /* Decorative Shape */
        .shape-bg {
            position: absolute;
            top: 0;
            right: 0;
            width: 45%;
            height: 100%;
            background-color: #F8FAFC;
            clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%);
            z-index: 1;
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Background Elements -->
<div class="shape-bg"></div>
<!-- Left Accent Borders -->
<div class="absolute left-0 top-0 h-full w-3 bg-brand-primary z-20"></div>
<div class="absolute left-3 top-0 h-full w-1 bg-brand-secondary z-20"></div>
<!-- Main Content Area -->
<div class="relative z-10 flex flex-col justify-center h-full w-full pl-24 pr-16 font-montserrat">
<!-- Top Header / Organization -->
<div class="absolute top-16 left-24 flex items-center gap-4">
<div>
<img src="Imagens/Logo ANTAQ.jpg" alt="Logo ANTAQ" style="height: 48px; width: auto;" />
</div>
<div>
<p class="text-gray-500 text-sm font-bold tracking-widest uppercase">Agência Nacional de Transportes Aquaviários</p>
<p class="text-gray-400 text-xs font-semibold tracking-wider uppercase">ANTAQ</p>
</div>
</div>
<!-- Title Block -->
<div class="mt-8">
<p class="text-9xl font-black text-brand-primary tracking-tighter mb-2 leading-none">SisPAT</p>
<div class="w-24 h-2 bg-brand-secondary mb-10 mt-2"></div>
<p class="text-4xl font-bold text-gray-800 mb-3 leading-tight max-w-4xl">
                    Sistema de Controle Patrimonial<br/>dos Portos Organizados
                </p>
<div class="mt-8 pl-6 border-l-4 border-gray-300">
<p class="text-2xl text-gray-600 font-light leading-relaxed">
                        Treinamento Simplificado da Funcionalidade de<br/>
<strong class="text-brand-secondary font-bold">Cadastro de Bens e Inventário</strong>
</p>
</div>
</div>
<!-- Footer Info -->
    <div class="absolute bottom-12 left-24 right-16 flex justify-between items-end border-t border-gray-200 pt-6">
<div class="flex flex-col gap-1 text-xs text-gray-500">
<span class="font-semibold uppercase tracking-wider text-gray-600">Canais oficiais ANTAQ</span>
<div class="flex flex-wrap items-center gap-3 mt-1">
<a href="https://www.facebook.com/ANTAQ.oficial" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1 hover:text-brand-secondary transition-colors">
<i class="fa-brands fa-facebook"></i><span>Facebook</span>
</a>
<a href="https://www.instagram.com/antaq_oficial/" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1 hover:text-brand-secondary transition-colors">
<i class="fa-brands fa-instagram"></i><span>Instagram</span>
</a>
<a href="https://www.youtube.com/c/CanalANTAQ/" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1 hover:text-brand-secondary transition-colors">
<i class="fa-brands fa-youtube"></i><span>YouTube</span>
</a>
<a href="https://www.linkedin.com/company/antaq" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1 hover:text-brand-secondary transition-colors">
<i class="fa-brands fa-linkedin"></i><span>LinkedIn</span>
</a>
<a href="https://x.com/ANTAQ_oficial" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1 hover:text-brand-secondary transition-colors">
<i class="fa-brands fa-twitter"></i><span>Twitter</span>
</a>
</div>
</div>
<div class="flex items-center gap-3">
<div class="text-right">
<p class="text-brand-primary font-bold text-lg">Gestão Eficiente</p>
<p class="text-brand-secondary text-xs font-semibold uppercase tracking-wide">Tecnologia &amp; Inovação</p>
</div>
<div class="h-10 w-10 bg-brand-primary rounded-full flex items-center justify-center text-white">
<i class="fas fa-check"></i>
</div>
</div>
</div>
</div>
<!-- Large Decorative Icon (Watermark style) -->
<div class="absolute bottom-0 right-0 text-brand-primary opacity-5 z-0" style="font-size: 500px; line-height: 0; transform: translate(20%, 20%);">
<i class="fas fa-boxes-stacked"></i>
</div>
</div>
</body>
</html>
